name: CI

on:
  push:
    branches: [ "main", "master", "develop", "firebase-integration" ]
  pull_request:

jobs:
  test-rules:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: baserootio-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Java (required by emulators)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Firestore rules tests (emulator)
        run: pnpm test:rules
